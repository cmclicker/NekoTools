name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # Build verification — every package + app must compile cleanly.
      # Added in Phase 1.1e (PR #8 audit) when `apps/web-suite` became
      # the first real app shell. From here forward, "CI green" includes
      # full build integrity, not just typecheck/lint/test.
      - run: pnpm build
